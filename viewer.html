<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fleet Live | Archive Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .feed-item { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        input[type="text"], input[type="password"] { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100 transition-colors duration-500">

    <div class="max-w-md mx-auto p-4 md:pt-8">
        <header class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-slate-900 dark:text-white">Fleet Live</h1>
                <div class="mt-1 flex items-center gap-2">
                    <a href="index.html" class="flex items-center gap-1 text-[10px] font-black text-blue-500 uppercase tracking-widest hover:underline">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        Log Terminal
                    </a>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="VIEWER.refresh()" class="p-2 bg-white dark:bg-slate-900 rounded-lg shadow-sm border dark:border-slate-800 active:scale-90 transition-all text-slate-500 hover:text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
                <button onclick="VIEWER.toggleTheme()" class="p-2 bg-white dark:bg-slate-900 rounded-lg shadow-sm border dark:border-slate-800">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <details id="config-panel" class="mb-6 bg-slate-100 dark:bg-slate-900 rounded-2xl border dark:border-slate-800 group overflow-hidden">
            <summary class="p-3 text-[10px] text-slate-400 cursor-pointer text-center font-black uppercase tracking-[0.2em] list-none group-open:bg-slate-200 dark:group-open:bg-slate-800 transition-colors">
                Link Feed Database
            </summary>
            <div class="p-5 space-y-4">
                <input type="password" id="cfg-token" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="GitHub Token">
                <input type="text" id="cfg-repo" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Username/Repository">
                <button onclick="VIEWER.saveConfig()" class="w-full bg-blue-600 py-3 rounded-xl text-white font-black uppercase text-xs tracking-widest shadow-lg active:translate-y-0.5">Initialize Connection</button>
            </div>
        </details>

        <div class="mb-6 flex items-center justify-between px-4 py-2 bg-slate-200/50 dark:bg-slate-900 rounded-full border dark:border-slate-800">
            <div class="flex items-center">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-400 mr-2"></div>
                <span id="status-text" class="text-[9px] font-black uppercase text-slate-500 tracking-tight">Sync Status</span>
            </div>
            <span class="text-[9px] font-bold text-slate-400 uppercase italic" id="last-updated">Standby</span>
        </div>

        <div id="history-list" class="space-y-4">
            <div class="text-center py-20 opacity-30">
                <p class="text-[10px] font-black uppercase tracking-widest">Awaiting Database Link...</p>
            </div>
        </div>

        <footer class="mt-10 pb-10 text-center">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic opacity-50">Log Viewer Terminal v2.1</p>
        </footer>
    </div>

    <script>
        const VIEWER = {
            token: '',
            repo: '',

            init() {
                this.loadSettings();
                this.applyTheme();
                if(this.token && this.repo) {
                    this.refresh();
                    document.getElementById('config-panel').open = false;
                } else {
                    document.getElementById('config-panel').open = true;
                }
                setInterval(() => this.refresh(), 300000);
            },

            loadSettings() {
                this.token = localStorage.getItem('tlp_token') || '';
                this.repo = localStorage.getItem('tlp_repo') || '';
                document.getElementById('cfg-token').value = this.token;
                document.getElementById('cfg-repo').value = this.repo;
            },

            saveConfig() {
                const token = document.getElementById('cfg-token').value.trim();
                const repo = document.getElementById('cfg-repo').value.trim();
                localStorage.setItem('tlp_token', token);
                localStorage.setItem('tlp_repo', repo);
                this.token = token;
                this.repo = repo;
                this.refresh();
                document.getElementById('config-panel').open = false;
            },

            async refresh() {
                if(!this.token || !this.repo) return;
                const list = document.getElementById('history-list');
                const dot = document.getElementById('status-dot');
                const statusTxt = document.getElementById('status-text');
                const timeTxt = document.getElementById('last-updated');

                dot.className = "w-2 h-2 rounded-full bg-amber-500 animate-bounce mr-2";
                statusTxt.innerText = "Syncing...";

                try {
                    const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/trips.json`, {
                        headers: { 'Authorization': `token ${this.token}` }
                    });
                    const data = await res.json();
                    const trips = JSON.parse(atob(data.content)).slice(-10).reverse();
                    
                    dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse mr-2";
                    statusTxt.innerText = "Live Feed Active";
                    timeTxt.innerText = "Refreshed: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    list.innerHTML = trips.map(t => {
                        const tarpStyle = t.tarp === 'Steel' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/40' : 
                                        t.tarp === 'Lumber' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40' : 
                                        'bg-slate-100 dark:bg-slate-800 text-slate-500';
                        return `
                        <div class="feed-item bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">${t.order}</span>
                                    <div class="flex items-center gap-1 text-[9px] font-bold text-slate-400 mt-0.5">
                                        <span>${t.pDate}</span>
                                        <span class="text-slate-300">/</span>
                                        <span class="text-rose-500/70">${t.dDate}</span>
                                    </div>
                                </div>
                                <span class="px-2 py-1 rounded-md text-[8px] font-black uppercase border dark:border-slate-700 ${tarpStyle}">${t.tarp}</span>
                            </div>

                            <div class="grid grid-cols-7 gap-2 items-center mb-4 bg-slate-50 dark:bg-slate-800/40 p-3 rounded-xl border border-slate-100 dark:border-slate-800">
                                <div class="col-span-3">
                                    <span class="text-[7px] font-bold text-emerald-500 uppercase block mb-1">Origin</span>
                                    <p class="text-[10px] font-black uppercase truncate">${t.pCity}</p>
                                </div>
                                <div class="col-span-1 flex justify-center text-slate-300 italic text-[10px]">TO</div>
                                <div class="col-span-3 text-right">
                                    <span class="text-[7px] font-bold text-rose-500 uppercase block mb-1">Destination</span>
                                    <p class="text-[10px] font-black uppercase truncate">${t.dCity}</p>
                                </div>
                            </div>

                            <div class="flex justify-between items-center pt-3 border-t dark:border-slate-800">
                                <div class="flex gap-4 text-[9px] font-black uppercase text-slate-500">
                                    <span><span class="text-slate-400 font-bold mr-1 italic text-[7px]">Unit</span>${t.truck}</span>
                                    <span><span class="text-slate-400 font-bold mr-1 italic text-[7px]">Trl</span>${t.trailer}</span>
                                </div>
                                <span class="text-[8px] font-bold text-slate-400 uppercase">${t.codriver || 'Solo'}</span>
                            </div>
                        </div>`;
                    }).join('');
                } catch (e) {
                    dot.className = "w-2 h-2 rounded-full bg-rose-600 mr-2";
                    statusTxt.innerText = "Sync Failed";
                }
            },

            applyTheme() {
                const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.classList.toggle('dark', isDark);
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            },

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            }
        };
        VIEWER.init();
    </script>
</body>
</html>
