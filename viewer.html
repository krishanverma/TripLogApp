<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Load Database | Fleet Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .feed-item { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], input[type="date"], input[type="password"] { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100 transition-colors duration-500">

    <div class="max-w-2xl mx-auto p-4 md:pt-10">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <header class="bg-slate-900 dark:bg-black p-6 flex justify-between items-center border-b border-blue-500/20">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic uppercase text-blue-500">Truck Log Pro | Load Database</h1>
                <div id="status-bar" class="mt-1 flex items-center gap-3">
                    <div class="inline-flex items-center px-2 py-0.5 rounded bg-slate-800 border border-slate-700">
                        <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-600 mr-2"></span>
                        <span id="status-text" class="text-xs font-bold uppercase text-slate-400">Syncing Storage</span>
                    </div>
                    <a href="index.html" class="text-xs font-black text-blue-400 uppercase tracking-widest hover:underline">← New Entry</a>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="VIEWER.refresh()" class="p-2 bg-slate-800 rounded-lg border border-slate-700 active:scale-90 text-slate-400 hover:text-blue-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
                <button onclick="VIEWER.toggleTheme()" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700 shadow-lg active:scale-90 transition-all">
                    <span id="theme-icon" class="text-lg">🌙</span>
                </button>
            </div>
        </header>

        <details id="config-panel" class="mb-6 bg-slate-100 dark:bg-slate-900 rounded-2xl border dark:border-slate-800 group overflow-hidden">
            <summary class="p-3 text-sm text-slate-400 cursor-pointer text-center font-black uppercase tracking-[0.2em] list-none group-open:bg-slate-100 dark:group-open:bg-slate-800">Connection Settings</summary>
            <div class="p-5 space-y-4">
                <input type="password" id="cfg-token" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm outline-none" placeholder="GitHub Token">
                <input type="text" id="cfg-repo" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm outline-none" placeholder="User/Repo">
                <button onclick="VIEWER.saveConfig()" class="w-full bg-blue-600 py-3 rounded-xl text-white font-black uppercase text-xs tracking-widest active:translate-y-0.5">Verify Link</button>
            </div>
        </details>

        <div class="p-6 bg-slate-50 dark:bg-slate-800/50 border-b dark:border-slate-800 mb-6 space-y-4">
            <div class="w-full">
                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Search Order # or Truck ID</label>
                <input type="text" id="filter-search" oninput="VIEWER.applyFilter()" placeholder="Ex: LOAD-1234 or TRK-01..." class="w-full p-3 rounded-xl border dark:border-slate-700 bg-white dark:bg-slate-950 text-sm font-bold outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">From Date</label>
                    <input type="date" id="filter-start" class="w-full p-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">To Date</label>
                    <input type="date" id="filter-end" class="w-full p-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="VIEWER.applyFilter()" class="flex-1 sm:flex-none px-4 py-2.5 bg-blue-600 rounded-xl text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-500 transition-all shadow-md active:scale-95">Filter</button>
                    <button onclick="VIEWER.clearFilter()" class="flex-1 sm:flex-none px-4 py-2.5 bg-slate-200 dark:bg-slate-700 rounded-xl text-slate-600 dark:text-slate-300 font-black uppercase text-[10px] tracking-widest hover:bg-slate-300 dark:hover:bg-slate-600 transition-all active:scale-95">Clear</button>
                    <button onclick="VIEWER.exportPDF()" class="flex-1 sm:flex-none px-4 py-2.5 bg-emerald-600 rounded-xl text-white font-black uppercase text-[10px] tracking-widest hover:bg-emerald-500 transition-all shadow-md active:scale-95">PDF</button>
                </div>
            </div>
        </div>

        <div id="history-list" class="space-y-4">
            <!-- Loads will render here -->
        </div>

        </div>
    </div>

    <script>
        const VIEWER = {
            token: '',
            repo: '',
            items: [],
            filteredItems: [],
            currentLimit: 10,

            init() {
                this.loadSettings();
                this.applyTheme();
                this.refresh();
                window.addEventListener('storage', (e) => {
                    if(e.key === 'tlp_token' || e.key === 'tlp_repo') {
                        this.loadSettings();
                        this.refresh();
                    }
                });
            },

            loadSettings() {
                this.token = localStorage.getItem('tlp_token') || '';
                this.repo = localStorage.getItem('tlp_repo') || '';
                document.getElementById('cfg-token').value = this.token;
                document.getElementById('cfg-repo').value = this.repo;
            },

            saveConfig() {
                this.token = document.getElementById('cfg-token').value.trim();
                this.repo = document.getElementById('cfg-repo').value.trim();
                localStorage.setItem('tlp_token', this.token);
                localStorage.setItem('tlp_repo', this.repo);
                this.refresh();
                document.getElementById('config-panel').open = false;
            },

            updateStatus(type, msg) {
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                const colors = { online: 'bg-blue-500 animate-pulse', testing: 'bg-amber-500 animate-bounce', error: 'bg-rose-600', offline: 'bg-slate-600' };
                dot.className = `w-1.5 h-1.5 rounded-full mr-2 ${colors[type] || colors.offline}`;
                txt.innerText = msg;
            },

            async refresh() {
                if(!this.token || !this.repo) {
                    this.updateStatus('offline', 'Setup Required');
                    document.getElementById('config-panel').open = true;
                    return;
                }
                this.updateStatus('testing', 'Verifying...');

                try {
                    const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/trips.json`, {
                        headers: { 'Authorization': `token ${this.token}` }
                    });
                    const data = await res.json();
                    this.items = JSON.parse(atob(data.content)).reverse();
                    this.filteredItems = [...this.items];
                    this.render(this.filteredItems, this.currentLimit);
                    
                    this.updateStatus('online', 'Database Active');
                    document.getElementById('config-panel').open = false;
                } catch (e) {
                    this.updateStatus('error', 'Link Error');
                }
            },

            applyFilter() {
                const start = document.getElementById('filter-start').value;
                const end = document.getElementById('filter-end').value;
                const search = document.getElementById('filter-search').value.toUpperCase().trim();
                
                this.filteredItems = this.items.filter(t => {
                    if(start && t.pDate < start) return false;
                    if(end && t.pDate > end) return false;
                    
                    if(search) {
                        const matchOrder = t.order.toUpperCase().includes(search);
                        const matchTruck = t.truck.toUpperCase().includes(search);
                        if(!matchOrder && !matchTruck) return false;
                    }
                    return true;
                });
                
                this.currentLimit = 10;
                this.render(this.filteredItems, this.currentLimit);
            },

            clearFilter() {
                document.getElementById('filter-start').value = '';
                document.getElementById('filter-end').value = '';
                document.getElementById('filter-search').value = '';
                this.filteredItems = [...this.items];
                this.currentLimit = 10;
                this.render(this.filteredItems, this.currentLimit);
            },

            async exportPDF() {
                if (this.filteredItems.length === 0) return alert("No data to export");
                
                const btn = document.querySelector('button[onclick="VIEWER.exportPDF()"]');
                const originalText = btn.innerText;
                btn.innerText = "...";
                
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a4');
                    
                    let hasFont = false;
                    try {
                        const res = await fetch('https://fonts.gstatic.com/s/caveat/v18/WnzW6H6EYW2D7XB6mAt9pDSX_V7_p-8m6ySGHmS_5Gj_m_U.ttf');
                        if (!res.ok) throw new Error("Font fetch failed");
                        const blob = await res.blob();
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result.split(',')[1]);
                            reader.readAsDataURL(blob);
                        });
                        doc.addFileToVFS('Handwriting.ttf', base64);
                        doc.addFont('Handwriting.ttf', 'Handwriting', 'normal');
                        hasFont = true;
                    } catch (e) {
                        console.error("Handwriting font failed to load:", e);
                    }

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(20);
                    doc.text('TRUCK LOG PRO | LOAD ARCHIVE', 14, 15);
                    
                    const tableColumn = ["Order #", "Pickup", "Delivery", "Truck", "Trailer", "Tarp", "Co-Driver"];
                    const tableRows = this.filteredItems.map(t => [
                        t.order,
                        `${t.pDate}\n${t.pCity}`,
                        `${t.dDate}\n${t.dCity}`,
                        t.truck,
                        t.trailer,
                        t.tarp,
                        t.codriver || 'Solo'
                    ]);

                    doc.autoTable({
                        head: [tableColumn],
                        body: tableRows,
                        startY: 25,
                        theme: 'grid',
                        styles: { 
                            font: hasFont ? 'Handwriting' : 'helvetica',
                            fontSize: hasFont ? 14 : 9, 
                            cellPadding: 4 
                        },
                        headStyles: { fillColor: [37, 99, 235], fontStyle: 'bold', font: 'helvetica', fontSize: 10 }
                    });

                    doc.save(`fleet_report_${new Date().toISOString().split('T')[0]}.pdf`);
                } catch (err) {
                    console.error("PDF Export Error:", err);
                    alert("Failed to generate PDF. Please try again.");
                } finally {
                    btn.innerText = originalText;
                }
            },

            render(items, limit = items.length) {
                const list = document.getElementById('history-list');
                const displayItems = items.slice(0, limit);
                if(!displayItems || displayItems.length === 0) {
                    list.innerHTML = `<div class="text-center py-20 opacity-30 font-black uppercase text-sm">No Loads Found</div>`;
                    return;
                }

                list.innerHTML = `
                <table class="w-full table-auto border-collapse bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-700">
                    <thead>
                        <tr class="bg-slate-100 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Order #</th>
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Pickup date</th>
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Delivery date</th>
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Truck</th>
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Trailer #</th>
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Tarp</th>
                            <th class="p-3 text-left text-sm font-bold text-slate-700 dark:text-slate-300">Co-Driver</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${displayItems.map(t => {
                            const tarpStyle = t.tarp === 'Steel' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/40' : 
                                            t.tarp === 'Lumber' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40' : 
                                            'bg-slate-100 dark:bg-slate-800 text-slate-500';
                            return `
                        <tr class="border-b border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                            <td class="p-3 text-sm font-bold text-blue-600">${t.order}</td>
                            <td class="p-3 text-sm">
                                <div class="font-bold">${t.pDate}</div>
                                <div class="text-slate-600 dark:text-slate-400">${t.pCity}</div>
                            </td>
                            <td class="p-3 text-sm">
                                <div class="font-bold text-rose-600">${t.dDate}</div>
                                <div class="text-slate-600 dark:text-slate-400">${t.dCity}</div>
                            </td>
                            <td class="p-3 text-sm font-mono">${t.truck}</td>
                            <td class="p-3 text-sm font-mono">${t.trailer}</td>
                            <td class="p-3 text-sm">
                                <span class="px-2 py-1 rounded text-xs font-bold uppercase ${tarpStyle}">${t.tarp}</span>
                            </td>
                            <td class="p-3 text-sm">${t.codriver || 'Solo'}</td>
                        </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;

                if (limit < items.length) {
                    list.innerHTML += `
                    <div class="text-center pt-6">
                        <button onclick="VIEWER.loadMore()" class="bg-blue-600 py-3 px-6 rounded-xl text-white font-black uppercase text-sm tracking-widest shadow-lg hover:bg-blue-500 active:scale-[0.98] transition-all">Load More Entries</button>
                    </div>`;
                }
            },

            loadMore() {
                this.currentLimit += 10;
                this.render(this.filteredItems, this.currentLimit);
            },

            applyTheme() {
                const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.classList.toggle('dark', isDark);
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            },

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            }
        };
        VIEWER.init();
    </script>
</body>
</html>
