<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Load Database | Fleet Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVgLC_yNrotuusroerl4OHAndVd_z7qSc",
            authDomain: "trucktriplog.firebaseapp.com",
            projectId: "trucktriplog",
            storageBucket: "trucktriplog.firebasestorage.app",
            messagingSenderId: "935555779677",
            appId: "1:935555779677:web:ac9b82ec9889cfd49011b4",
            measurementId: "G-6F3WTQTQNR"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <style>
        /* Prevents iOS auto-zoom on focus for mobile inputs */
        input[type="text"], input[type="date"], input[type="password"], input[type="number"], input[type="time"] { 
            font-size: 16px !important; 
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100 transition-colors duration-500">

    <div class="max-w-5xl mx-auto p-4 md:pt-10">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <header class="bg-slate-900 dark:bg-black p-6 flex justify-between items-center border-b border-blue-500/20">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic uppercase text-blue-500">Trip History</h1>
                <div id="status-bar" class="mt-1 flex items-center gap-3">
                    <div class="inline-flex items-center px-2 py-0.5 rounded bg-slate-800 border border-slate-700">
                        <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-600 mr-2"></span>
                        <span id="status-text" class="text-xs font-bold uppercase text-slate-400">Syncing Storage</span>
                    </div>
                    <div class="flex gap-3">
                        <a href="index.html" class="text-xs font-black text-blue-400 uppercase tracking-widest hover:underline">Add Trip</a>
                        <a href="expenses.html" class="text-xs font-black text-emerald-500 uppercase tracking-widest hover:underline">Expenses</a>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="VIEWER.refresh()" class="p-2 bg-slate-800 rounded-lg border border-slate-700 active:scale-90 text-slate-400 hover:text-blue-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
                <button onclick="UI.toggleTheme()" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700 shadow-lg active:scale-90 transition-all">
                    <span id="theme-icon" class="text-lg">🌙</span>
                </button>
            </div>
        </header>

        <div class="p-6 bg-slate-50 dark:bg-slate-800/50 border-b dark:border-slate-800 mb-6 space-y-4">
            <div class="flex items-center gap-2 px-1">
                <span class="text-[10px] font-black uppercase text-slate-500 tracking-[0.15em]">Total Loads Delivered:</span>
                <span id="total-loads-count" class="text-xs font-black text-blue-600 bg-blue-50 dark:bg-blue-900/40 px-2.5 py-0.5 rounded-lg border border-blue-100 dark:border-blue-800/50 shadow-sm">0</span>
            </div>
            <div class="w-full">
                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">Search Order # or Truck ID</label>
                <input type="text" id="filter-search" oninput="VIEWER.applyFilter()" placeholder="Ex: LOAD-1234 or TRK-01..." class="w-full p-3 rounded-xl border dark:border-slate-700 bg-white dark:bg-slate-950 text-sm font-bold outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">From Date</label>
                    <input type="date" id="filter-start" class="w-full p-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1">To Date</label>
                    <input type="date" id="filter-end" class="w-full p-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="VIEWER.applyFilter()" class="flex-1 sm:flex-none px-4 py-2.5 bg-blue-600 rounded-xl text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-500 transition-all shadow-md active:scale-95">Filter</button>
                    <button onclick="VIEWER.clearFilter()" class="flex-1 sm:flex-none px-4 py-2.5 bg-slate-200 dark:bg-slate-700 rounded-xl text-slate-600 dark:text-slate-300 font-black uppercase text-[10px] tracking-widest hover:bg-slate-300 dark:hover:bg-slate-600 transition-all active:scale-95">Clear</button>
                    <button onclick="VIEWER.exportPDF()" class="flex-1 sm:flex-none px-4 py-2.5 bg-emerald-600 rounded-xl text-white font-black uppercase text-[10px] tracking-widest hover:bg-emerald-500 transition-all shadow-md active:scale-95">PDF</button>
                </div>
            </div>
        </div>

        <div id="history-list" class="space-y-4">
            <!-- Loads will render here -->
        </div>

        </div>
    </div>

    <script src="ui-utils.js"></script>
    <script src="viewer.js" defer></script>
</body>
</html>
