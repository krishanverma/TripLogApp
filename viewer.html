<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fleet Live | View-Only Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .feed-item { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100 transition-colors duration-500">

    <div class="max-w-md mx-auto p-4 md:pt-8">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-slate-900 dark:text-white">Fleet Live</h1>
                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Real-time Archive Feed</p>
            </div>
            <div class="flex gap-2">
                <button onclick="VIEWER.refresh()" class="p-2 bg-white dark:bg-slate-900 rounded-lg shadow-sm border dark:border-slate-800 active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
                <button onclick="VIEWER.toggleTheme()" class="p-2 bg-white dark:bg-slate-900 rounded-lg shadow-sm border dark:border-slate-800">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <div class="mb-6 flex items-center justify-between px-4 py-2 bg-slate-100 dark:bg-slate-900 rounded-full border dark:border-slate-800">
            <div class="flex items-center">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-400 mr-2"></div>
                <span id="status-text" class="text-[9px] font-black uppercase text-slate-500">Standby</span>
            </div>
            <span class="text-[9px] font-bold text-slate-400 uppercase italic" id="last-updated">Never Updated</span>
        </div>

        <div id="history-list" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 opacity-20">
                <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <span class="text-[10px] font-black uppercase tracking-widest">Fetching Logs...</span>
            </div>
        </div>

        <footer class="mt-10 pb-10 text-center">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Powered by Truck Log Pro Cloud</p>
        </footer>
    </div>

    <script>
        const VIEWER = {
            // CRITICAL: Hardcode your details here or use a "Public" token if preferred
            // Since this is a viewer, you might want to use a Token with "Read-Only" repo access
            repo: 'YOUR_USERNAME/YOUR_REPO_NAME',
            token: 'YOUR_GITHUB_TOKEN', 

            init() {
                this.applyTheme();
                this.refresh();
                // Auto-refresh every 5 minutes
                setInterval(() => this.refresh(), 300000);
            },

            async refresh() {
                const list = document.getElementById('history-list');
                const dot = document.getElementById('status-dot');
                const statusTxt = document.getElementById('status-text');
                const timeTxt = document.getElementById('last-updated');

                dot.className = "w-2 h-2 rounded-full bg-amber-500 animate-bounce mr-2";
                statusTxt.innerText = "Syncing...";

                try {
                    const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/trips.json`, {
                        headers: { 'Authorization': `token ${this.token}` }
                    });
                    const data = await res.json();
                    const trips = JSON.parse(atob(data.content)).slice(-10).reverse();
                    
                    dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse mr-2";
                    statusTxt.innerText = "Live";
                    timeTxt.innerText = "Updated: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    list.innerHTML = trips.map(t => {
                        const tarpColors = {
                            'Steel': 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400',
                            'Lumber': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400'
                        };
                        return `
                        <div class="feed-item bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">${t.order}</span>
                                    <div class="flex items-center gap-1 text-[9px] font-bold text-slate-400 mt-0.5">
                                        <span>${t.pDate}</span>
                                        <span class="text-slate-300">/</span>
                                        <span class="text-rose-500/70">${t.dDate}</span>
                                    </div>
                                </div>
                                <span class="px-2 py-1 rounded-md text-[8px] font-black uppercase border dark:border-slate-700 ${tarpColors[t.tarp] || 'bg-slate-100 dark:bg-slate-800 text-slate-500'}">${t.tarp}</span>
                            </div>

                            <div class="grid grid-cols-7 gap-2 items-center mb-4">
                                <div class="col-span-3">
                                    <span class="text-[7px] font-bold text-emerald-500 uppercase block mb-1">Origin</span>
                                    <p class="text-[11px] font-black uppercase truncate">${t.pCity}</p>
                                </div>
                                <div class="col-span-1 flex justify-center text-slate-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                                </div>
                                <div class="col-span-3 text-right">
                                    <span class="text-[7px] font-bold text-rose-500 uppercase block mb-1">Destination</span>
                                    <p class="text-[11px] font-black uppercase truncate">${t.dCity}</p>
                                </div>
                            </div>

                            <div class="flex justify-between items-center pt-3 border-t dark:border-slate-800">
                                <div class="flex gap-4">
                                    <div class="text-[9px] font-black uppercase text-slate-500"><span class="text-slate-400 font-bold mr-1 italic text-[7px]">Unit</span>${t.truck}</div>
                                    <div class="text-[9px] font-black uppercase text-slate-500"><span class="text-slate-400 font-bold mr-1 italic text-[7px]">Trl</span>${t.trailer}</div>
                                </div>
                                <span class="text-[8px] font-bold text-slate-400 uppercase">${t.codriver === 'SOLO' ? 'Solo' : t.codriver}</span>
                            </div>
                        </div>`;
                    }).join('');
                } catch (e) {
                    dot.className = "w-2 h-2 rounded-full bg-rose-600 mr-2";
                    statusTxt.innerText = "Sync Error";
                }
            },

            applyTheme() {
                const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.classList.toggle('dark', isDark);
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            },

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            }
        };
        VIEWER.init();
    </script>
</body>
</html>
