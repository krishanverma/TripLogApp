<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Log Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div class="max-w-3xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div class="bg-blue-900 p-6 text-white text-center">
                <h1 class="text-3xl font-black tracking-tighter">TRUCK LOG PRO</h1>
                <div id="connectionStatus" class="mt-2 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-gray-700 text-gray-300">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-500 mr-2"></span>
                    <span id="statusText">OFFLINE (NO SETTINGS)</span>
                </div>
            </div>

            <details class="bg-gray-50 border-b" id="settingsDetails">
                <summary class="p-3 text-xs text-gray-500 cursor-pointer hover:bg-gray-100 uppercase font-bold text-center">
                    Settings & Connection Test
                </summary>
                <div class="p-4 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-600">GitHub Token</label>
                            <input type="password" id="ghToken" class="w-full p-2 border rounded text-sm" placeholder="ghp_xxxxxxxx">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600">Data Repo (User/Repo)</label>
                            <input type="text" id="ghRepo" class="w-full p-2 border rounded text-sm" placeholder="username/my-trip-data">
                        </div>
                    </div>
                    <button onclick="testAndSaveSettings()" id="testBtn" class="w-full bg-black text-white py-3 rounded font-bold hover:bg-gray-800 transition">
                        TEST & SAVE CONNECTION
                    </button>
                </div>
            </details>

            <form id="tripForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2 border-b pb-1 mb-2 font-bold text-blue-900 uppercase text-sm">Trip Details</div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Order #</label>
                    <input type="text" id="order_number" required class="w-full border-b-2 border-gray-200 focus:border-blue-600 outline-none py-2 text-lg font-bold uppercase">
                </div>
                <div>
                    <label class="block text-xs font-bold text-green-700 uppercase">Pickup Date</label>
                    <input type="date" id="pickup_date" required class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="block text-xs font-bold text-green-700 uppercase">Pickup City</label>
                    <input type="text" id="pickup_city" required placeholder="City, State" class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="block text-xs font-bold text-red-700 uppercase">Delivery Date</label>
                    <input type="date" id="delivery_date" required class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="block text-xs font-bold text-red-700 uppercase">Delivery City</label>
                    <input type="text" id="delivery_city" required placeholder="City, State" class="w-full border rounded p-2 mt-1">
                </div>
                <div class="md:col-span-2 border-b pb-1 mb-2 mt-4 font-bold text-blue-900 uppercase text-sm">Equipment & Crew</div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Truck ID</label>
                    <input type="text" id="truck" required class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Trailer #</label>
                    <input type="text" id="trailer" required class="w-full border rounded p-2 mt-1">
                </div>
                <div class="flex items-center space-x-2 pt-4">
                    <input type="checkbox" id="tarp" class="w-6 h-6 border-gray-300 rounded">
                    <label class="text-sm font-bold text-gray-700">TARP REQUIRED</label>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Co-driver</label>
                    <input type="text" id="co_driver" placeholder="None" class="w-full border rounded p-2 mt-1">
                </div>
                <button type="submit" id="saveBtn" class="md:col-span-2 mt-6 bg-blue-700 text-white font-black py-5 rounded-xl shadow-lg hover:bg-blue-800 active:scale-95 transition text-xl uppercase">
                    SAVE TRIP TO CLOUD
                </button>
            </form>

            <div class="p-6 bg-gray-50 border-t flex flex-col sm:flex-row items-center justify-between gap-4">
                <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Reports</span>
                <div class="flex w-full sm:w-auto gap-2">
                    <input type="month" id="exportMonth" class="flex-1 p-2 border rounded font-bold text-sm">
                    <button onclick="exportToPDF()" class="bg-red-600 text-white px-6 py-2 rounded font-black hover:bg-red-700 uppercase text-sm">PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;

        // Auto-load settings and test connection on start
        window.onload = () => {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if(token && repo) {
                document.getElementById('ghToken').value = token;
                document.getElementById('ghRepo').value = repo;
                testAndSaveSettings(true); // Silent test
            }
        };

        async function testAndSaveSettings(isSilent = false) {
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            const btn = document.getElementById('testBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if(!token || !repo) return;

            if(!isSilent) btn.innerText = "TESTING...";

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if(res.ok) {
                    localStorage.setItem('gh_token', token);
                    localStorage.setItem('gh_repo', repo);
                    statusDot.className = "w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse";
                    statusText.innerText = "CONNECTED TO CLOUD";
                    if(!isSilent) {
                        alert("✅ Connection Successful! Data repo found.");
                        document.getElementById('settingsDetails').open = false;
                    }
                } else {
                    throw new Error(res.statusText);
                }
            } catch (err) {
                statusDot.className = "w-2 h-2 rounded-full bg-red-500 mr-2";
                statusText.innerText = "CONNECTION ERROR";
                if(!isSilent) alert("❌ Error: " + err.message + ". Check your token and repo name.");
            } finally {
                if(!isSilent) btn.innerText = "TEST & SAVE CONNECTION";
            }
        }

        document.getElementById('tripForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');

            if(!token || !repo) return alert("Please set up your Connection Settings first!");

            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const trips = JSON.parse(atob(fileData.content));

                const newTrip = {
                    id: Date.now(),
                    order: document.getElementById('order_number').value.toUpperCase(),
                    pDate: document.getElementById('pickup_date').value,
                    pCity: document.getElementById('pickup_city').value,
                    dDate: document.getElementById('delivery_date').value,
                    dCity: document.getElementById('delivery_city').value,
                    truck: document.getElementById('truck').value,
                    trailer: document.getElementById('trailer').value,
                    tarp: document.getElementById('tarp').checked ? "YES" : "NO",
                    codriver: document.getElementById('co_driver').value || "N/A"
                };

                trips.push(newTrip);

                const updateRes = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Trip ${newTrip.order} logged`,
                        content: btoa(JSON.stringify(trips, null, 2)),
                        sha: fileData.sha
                    })
                });

                if(updateRes.ok) {
                    alert("✅ TRIP SAVED TO CLOUD");
                    document.getElementById('tripForm').reset();
                } else {
                    throw new Error("Failed to upload.");
                }
            } catch (err) {
                alert("❌ SAVE FAILED: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "SAVE TRIP TO CLOUD";
            }
        });

        async function exportToPDF() {
            const selectedMonth = document.getElementById('exportMonth').value;
            if(!selectedMonth) return alert("Select a month first!");
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const trips = JSON.parse(atob(fileData.content));
                const filtered = trips.filter(t => t.pDate.startsWith(selectedMonth));

                if(filtered.length === 0) return alert("No trips found for this month!");

                const doc = new jsPDF('landscape');
                doc.setFontSize(20);
                doc.text(`TRUCK LOG REPORT: ${selectedMonth}`, 14, 20);
                
                const tableData = filtered.map(t => [
                    t.order, t.pDate, t.pCity, t.dDate, t.dCity, t.truck, t.trailer, t.tarp, t.codriver
                ]);

                doc.autoTable({
                    startY: 30,
                    head: [['Order #', 'Pickup', 'From', 'Delivery', 'To', 'Truck', 'Trailer', 'Tarp', 'Co-Driver']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: [0, 51, 102] }
                });

                doc.save(`Log-${selectedMonth}.pdf`);
            } catch (err) {
                alert("Could not load data for PDF.");
            }
        }
    </script>
</body>
</html>
