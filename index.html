<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Log Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind configuration for Dark Mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen pb-20 font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div class="max-w-3xl mx-auto p-4">
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
            
            <div class="bg-slate-900 dark:bg-black p-6 text-white flex justify-between items-center border-b border-blue-500/30">
                <div class="text-left">
                    <h1 class="text-2xl font-black tracking-tighter italic uppercase text-blue-400">Truck Log Pro</h1>
                    <div id="connectionStatus" class="mt-1 inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-slate-800 text-slate-400 border border-slate-700">
                        <span id="statusDot" class="w-1.5 h-1.5 rounded-full bg-slate-500 mr-2"></span>
                        <span id="statusText uppercase">OFFLINE</span>
                    </div>
                </div>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-slate-800 hover:bg-slate-700 transition-all border border-slate-700 shadow-inner">
                    <span id="themeIcon" class="text-xl">🌙</span>
                </button>
            </div>

            <details class="bg-slate-50 dark:bg-slate-800/50 border-b dark:border-slate-800" id="settingsDetails">
                <summary class="p-3 text-[10px] text-slate-500 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 uppercase font-black text-center tracking-widest">
                    System Configuration
                </summary>
                <div class="p-4 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase">Access Token</label>
                            <input type="password" id="ghToken" class="w-full p-2 border dark:border-slate-700 rounded text-sm bg-white dark:bg-slate-900 shadow-inner" placeholder="ghp_xxxxxxxx">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase">Target Repository</label>
                            <input type="text" id="ghRepo" class="w-full p-2 border dark:border-slate-700 rounded text-sm bg-white dark:bg-slate-900 shadow-inner" placeholder="user/repo">
                        </div>
                    </div>
                    <button onclick="testAndSaveSettings()" id="testBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded font-black transition uppercase tracking-widest text-[10px]">
                        Sync Database
                    </button>
                </div>
            </details>

            <form id="tripForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2 border-l-4 border-blue-500 pl-3 mb-2">
                    <label class="block text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Log Identifier</label>
                    <input type="text" id="order_number" required class="w-full bg-transparent border-b-2 border-slate-200 dark:border-slate-700 focus:border-blue-500 outline-none py-2 text-2xl font-black uppercase placeholder-slate-300 dark:placeholder-slate-700">
                </div>

                <div class="space-y-4">
                    <div class="p-3 rounded-lg bg-slate-50 dark:bg-slate-800/40 border dark:border-slate-800">
                        <label class="block text-[10px] font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mb-2">Pickup Details</label>
                        <input type="date" id="pickup_date" required class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 mb-2 font-bold text-sm">
                        <input type="text" id="pickup_city" required placeholder="Origin City, Prov/State" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 text-sm">
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="p-3 rounded-lg bg-slate-50 dark:bg-slate-800/40 border dark:border-slate-800">
                        <label class="block text-[10px] font-black text-rose-600 dark:text-rose-400 uppercase tracking-widest mb-2">Delivery Details</label>
                        <input type="date" id="delivery_date" required class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 mb-2 font-bold text-sm">
                        <input type="text" id="delivery_city" required placeholder="Dest City, Prov/State" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 text-sm">
                    </div>
                </div>

                <div class="md:col-span-2 grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Truck ID</label>
                        <input type="text" id="truck" required class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Trailer #</label>
                        <input type="text" id="trailer" required class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 text-sm font-bold">
                    </div>
                </div>

                <div class="md:col-span-2 bg-slate-900 dark:bg-black p-4 rounded-lg border border-slate-800">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-4 tracking-[0.2em] text-center">Tarp Classification</label>
                    <div class="flex justify-around items-center">
                        <label class="flex flex-col items-center gap-2 cursor-pointer group">
                            <input type="radio" name="tarp_type" value="None" checked class="sr-only peer">
                            <div class="w-12 h-12 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:border-blue-500 peer-checked:bg-blue-500/20 transition-all text-xs font-bold text-slate-500 peer-checked:text-blue-400">OFF</div>
                            <span class="text-[10px] font-bold text-slate-600 peer-checked:text-blue-500">NONE</span>
                        </label>
                        <label class="flex flex-col items-center gap-2 cursor-pointer group">
                            <input type="radio" name="tarp_type" value="Steel" class="sr-only peer">
                            <div class="w-12 h-12 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:border-blue-500 peer-checked:bg-blue-500/20 transition-all text-xs font-bold text-slate-500 peer-checked:text-blue-400">STL</div>
                            <span class="text-[10px] font-bold text-slate-600 peer-checked:text-blue-500">STEEL</span>
                        </label>
                        <label class="flex flex-col items-center gap-2 cursor-pointer group">
                            <input type="radio" name="tarp_type" value="Lumber" class="sr-only peer">
                            <div class="w-12 h-12 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:border-blue-500 peer-checked:bg-blue-500/20 transition-all text-xs font-bold text-slate-500 peer-checked:text-blue-400">LMB</div>
                            <span class="text-[10px] font-bold text-slate-600 peer-checked:text-blue-500">LUMBER</span>
                        </label>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Co-driver / Team</label>
                    <input type="text" id="co_driver" placeholder="Solo Operations" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-700 rounded p-2 text-sm">
                </div>

                <button type="submit" id="saveBtn" class="md:col-span-2 mt-4 bg-blue-600 text-white font-black py-4 rounded-lg shadow-xl hover:bg-blue-500 active:scale-95 transition-all text-lg uppercase tracking-widest border-b-4 border-blue-800">
                    Commit to Cloud
                </button>
            </form>

            <div class="bg-slate-50 dark:bg-slate-950 p-6 border-t dark:border-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recent Fleet Logs</h2>
                    <button onclick="fetchHistory()" class="text-[10px] text-blue-500 font-bold uppercase hover:underline">Sync Now</button>
                </div>
                <div class="space-y-2" id="historyBody">
                    <p class="text-center text-xs text-slate-500 py-4 italic">No logs detected...</p>
                </div>
            </div>

            <div class="p-6 bg-white dark:bg-slate-900 border-t dark:border-slate-800 flex flex-col sm:flex-row items-center gap-4">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Archive Export</span>
                <div class="flex flex-1 w-full gap-2">
                    <input type="month" id="exportMonth" class="flex-1 p-2 border dark:border-slate-700 rounded font-bold text-xs bg-slate-50 dark:bg-slate-900 shadow-inner">
                    <button onclick="exportToPDF()" class="bg-rose-600 hover:bg-rose-500 text-white px-6 py-2 rounded font-black uppercase text-xs shadow-lg transition-colors">Generate PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;

        // Dark Mode Logic
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.innerText = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.innerText = '☀️';
            }
        }

        // Initialize Theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').innerText = '☀️';
        }

        window.onload = () => {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if(token && repo) {
                document.getElementById('ghToken').value = token;
                document.getElementById('ghRepo').value = repo;
                testAndSaveSettings(true);
            }
        };

        async function testAndSaveSettings(isSilent = false) {
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');

            if(!token || !repo) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if(res.ok) {
                    localStorage.setItem('gh_token', token);
                    localStorage.setItem('gh_repo', repo);
                    dot.className = "w-1.5 h-1.5 rounded-full bg-blue-500 mr-2 animate-pulse";
                    txt.innerText = "ONLINE";
                    fetchHistory();
                    if(!isSilent) document.getElementById('settingsDetails').open = false;
                } else { throw new Error(); }
            } catch (err) {
                dot.className = "w-1.5 h-1.5 rounded-full bg-rose-600 mr-2";
                txt.innerText = "ERROR";
            }
        }

        async function fetchHistory() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            const container = document.getElementById('historyBody');
            if(!token || !repo) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const trips = JSON.parse(atob(fileData.content));
                const recent = trips.slice(-4).reverse();
                
                if(recent.length > 0) {
                    container.innerHTML = recent.map(t => `
                        <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-lg shadow-sm">
                            <div>
                                <div class="text-[10px] font-black text-blue-500 uppercase">${t.order}</div>
                                <div class="text-xs font-bold">${t.dCity}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-[10px] font-bold text-slate-400">${t.pDate}</div>
                                <div class="text-[8px] px-1 bg-slate-100 dark:bg-slate-800 rounded inline-block font-black">${t.tarp}</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("History sync failed"); }
        }

        document.getElementById('tripForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');

            btn.disabled = true;
            btn.innerText = "COMMITTING...";

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const trips = JSON.parse(atob(fileData.content));

                const tarpValue = document.querySelector('input[name="tarp_type"]:checked').value;

                const newTrip = {
                    order: document.getElementById('order_number').value.toUpperCase(),
                    pDate: document.getElementById('pickup_date').value,
                    pCity: document.getElementById('pickup_city').value,
                    dDate: document.getElementById('delivery_date').value,
                    dCity: document.getElementById('delivery_city').value,
                    truck: document.getElementById('truck').value,
                    trailer: document.getElementById('trailer').value,
                    tarp: tarpValue,
                    codriver: document.getElementById('co_driver').value || "SOLO"
                };

                trips.push(newTrip);

                await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Archive entry ${newTrip.order}`,
                        content: btoa(JSON.stringify(trips, null, 2)),
                        sha: fileData.sha
                    })
                });

                alert("LOG COMMITTED TO CLOUD");
                document.getElementById('tripForm').reset();
                fetchHistory();
            } catch (err) {
                alert("CRITICAL ERROR: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Commit to Cloud";
            }
        });

        async function exportToPDF() {
            const month = document.getElementById('exportMonth').value;
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if(!month) return alert("Select month");

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/trips.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const trips = JSON.parse(atob(fileData.content));
                const filtered = trips.filter(t => t.pDate.startsWith(month));

                if(filtered.length === 0) return alert("No logs found");

                const doc = new jsPDF('l', 'mm', 'a4');
                doc.setFontSize(22);
                doc.text("FLEET LOG ARCHIVE", 14, 20);
                
                const tableData = filtered.map(t => [
                    t.order, t.pDate, t.pCity, t.dDate, t.dCity, t.truck, t.trailer, t.tarp, t.codriver
                ]);

                doc.autoTable({
                    startY: 35,
                    head: [['LOG ID', 'PICKUP', 'FROM', 'DELIVERY', 'TO', 'TRUCK', 'TRAILER', 'TARP', 'CREW']],
                    body: tableData,
                    headStyles: { fillColor: [15, 23, 42] }
                });

                doc.save(`Fleet_Log_${month}.pdf`);
            } catch (e) { alert("PDF Error"); }
        }
    </script>
</body>
</html>
