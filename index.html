<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck Log Pro | Entry Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input[type="text"], input[type="date"], input[type="password"] { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100 transition-colors duration-500">

    <div class="max-w-2xl mx-auto p-4 md:pt-10">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
            
            <header class="bg-slate-900 dark:bg-black p-6 flex justify-between items-center border-b border-blue-500/20">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter italic uppercase text-blue-500">Truck Log Pro</h1>
                    <div id="status-bar" class="mt-1 flex items-center gap-3">
                        <div class="inline-flex items-center px-2 py-0.5 rounded bg-slate-800 border border-slate-700">
                            <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-600 mr-2"></span>
                            <span id="status-text" class="text-xs font-bold uppercase text-slate-400">Offline</span>
                        </div>
                        <div class="flex gap-3">
                            <a href="viewer.html" class="text-xs font-black text-blue-400 uppercase tracking-widest hover:underline">Load Database</a>
                            <a href="expenses.html" class="text-xs font-black text-emerald-500 uppercase tracking-widest hover:underline">Expenses</a>
                        </div>
                    </div>
                </div>
                <button onclick="APP.toggleTheme()" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700 shadow-lg active:scale-90 transition-all">
                    <span id="theme-icon" class="text-lg">🌙</span>
                </button>
            </header>

            <details id="config-panel" class="bg-slate-50 dark:bg-slate-800/30 border-b dark:border-slate-800 group">
                <summary class="p-3 text-sm text-slate-400 cursor-pointer text-center font-black uppercase tracking-[0.2em] list-none group-open:bg-slate-100 dark:group-open:bg-slate-800">Connection Settings</summary>
                <div class="p-5 space-y-4">
                    <input type="password" id="cfg-token" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm outline-none" placeholder="GitHub Token">
                    <input type="text" id="cfg-repo" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm outline-none" placeholder="User/Repo">
                    <button onclick="APP.saveConfig()" class="w-full bg-blue-600 py-3 rounded-xl text-white font-black uppercase text-xs tracking-widest shadow-lg">Verify Link</button>
                </div>
            </details>

            <form id="log-form" class="p-6 space-y-6">
                <div class="border-l-4 border-blue-600 pl-4">
                    <label class="text-sm font-black text-blue-600 uppercase tracking-widest">Order #</label>
                    <input type="text" id="order_number" required placeholder="Enter Order #" class="w-full bg-transparent border-b-2 border-slate-200 dark:border-slate-700 focus:border-blue-600 outline-none py-2 text-3xl font-black lowercase">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-4 rounded-2xl bg-emerald-50/50 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-900/30">
                        <label class="text-sm font-black text-emerald-600 uppercase mb-3 block">Pickup Details</label>
                        <input type="date" id="pickup_date" required class="w-full p-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold mb-2 text-sm">
                        <input type="text" id="pickup_city" required placeholder="City, State" onblur="APP.calculateMiles()" class="w-full p-2 rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-950 text-sm">
                    </div>
                    <div class="p-4 rounded-2xl bg-rose-50/50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-900/30">
                        <label class="text-sm font-black text-rose-600 uppercase mb-3 block">Delivery Details</label>
                        <input type="date" id="delivery_date" required class="w-full p-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold mb-2 text-sm">
                        <div class="relative">
                            <input type="text" id="delivery_city" required placeholder="City, State" onblur="APP.calculateMiles()" class="w-full p-2 rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-950 text-sm">
                            <div id="miles-indicator" class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-[10px] font-black bg-blue-100 text-blue-700 px-2 py-1 rounded animate-pulse">CALC...</div>
                        </div>
                    </div>
                </div>

                <div class="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase text-slate-500">Estimated Trip Distance</span>
                    <input type="text" id="est_miles" placeholder="---" readonly class="bg-transparent text-right font-black text-blue-600 outline-none w-20">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="truck" required placeholder="Truck ID" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 font-bold text-sm">
                    <input type="text" id="trailer" required placeholder="Trailer #" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 font-bold text-sm">
                </div>

                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <div class="flex justify-between items-center px-4">
                        <label class="flex flex-col items-center gap-1 cursor-pointer"><input type="radio" name="tarp_type" value="None" checked class="sr-only peer"><div class="w-10 h-10 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:bg-blue-600 peer-checked:border-blue-500 text-[10px] font-black transition-all">OFF</div><span class="text-[10px] font-bold text-slate-500 peer-checked:text-blue-500 uppercase">None</span></label>
                        <label class="flex flex-col items-center gap-1 cursor-pointer"><input type="radio" name="tarp_type" value="Steel" class="sr-only peer"><div class="w-10 h-10 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:bg-blue-600 peer-checked:border-blue-500 text-[10px] font-black transition-all">S</div><span class="text-[10px] font-bold text-slate-500 peer-checked:text-blue-500 uppercase">Steel</span></label>
                        <label class="flex flex-col items-center gap-1 cursor-pointer"><input type="radio" name="tarp_type" value="Lumber" class="sr-only peer"><div class="w-10 h-10 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:bg-blue-600 peer-checked:border-blue-500 text-[10px] font-black transition-all">L</div><span class="text-[10px] font-bold text-slate-500 peer-checked:text-blue-500 uppercase">Lumber</span></label>
                    </div>
                </div>

                <input type="text" id="co_driver" placeholder="Co-Driver (Optional)" class="w-full p-3 border dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm">
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 py-5 rounded-2xl text-white font-black uppercase text-lg italic tracking-tighter shadow-xl hover:bg-blue-500 active:scale-[0.98] transition-all border-b-4 border-blue-800">Submit Log</button>
            </form>

        </div>
    </div>

    <script>
        const APP = {
            config: { token: '', repo: '' },
            
            init() {
                this.loadSettings();
                this.applyTheme();
                if(this.config.token && this.config.repo) {
                    this.verifyConnection(true);
                } else {
                    this.updateStatus('offline', 'Setup Required');
                    document.getElementById('config-panel').open = true;
                }
            },

            loadSettings() {
                this.config.token = localStorage.getItem('tlp_token') || '';
                this.config.repo = localStorage.getItem('tlp_repo') || '';
                document.getElementById('cfg-token').value = this.config.token;
                document.getElementById('cfg-repo').value = this.config.repo;
            },

            saveConfig() {
                const token = document.getElementById('cfg-token').value.trim();
                const repo = document.getElementById('cfg-repo').value.trim();
                localStorage.setItem('tlp_token', token);
                localStorage.setItem('tlp_repo', repo);
                this.config.token = token;
                this.config.repo = repo;
                this.verifyConnection();
            },

            async verifyConnection(silent = false) {
                this.updateStatus('testing', 'Verifying...');
                try {
                    const res = await fetch(`https://api.github.com/repos/${this.config.repo}/contents/trips.json`, {
                        headers: { 'Authorization': `token ${this.config.token}` }
                    });
                    if(res.ok) {
                        this.updateStatus('online', 'Database Active');
                        if(!silent) document.getElementById('config-panel').open = false;
                    } else { throw new Error(); }
                } catch (e) { this.updateStatus('error', 'Link Error'); }
            },

            updateStatus(type, msg) {
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                const colors = { online: 'bg-blue-500 animate-pulse', testing: 'bg-amber-500 animate-bounce', error: 'bg-rose-600', offline: 'bg-slate-600' };
                dot.className = `w-1.5 h-1.5 rounded-full mr-2 ${colors[type] || colors.offline}`;
                txt.innerText = msg;
            },

            async calculateMiles() {
                const pCity = document.getElementById('pickup_city').value;
                const dCity = document.getElementById('delivery_city').value;
                const indicator = document.getElementById('miles-indicator');
                const milesInput = document.getElementById('est_miles');

                if(!pCity || !dCity) return;
                
                indicator.classList.remove('hidden');
                try {
                    const getCoords = async (city) => {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
                        const data = await res.json();
                        return data.length > 0 ? { lat: data[0].lat, lon: data[0].lon } : null;
                    };

                    const [p1, p2] = await Promise.all([getCoords(pCity), getCoords(dCity)]);

                    if (p1 && p2) {
                        const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${p1.lon},${p1.lat};${p2.lon},${p2.lat}?overview=false`);
                        const routeData = await routeRes.json();
                        if (routeData.routes?.[0]) {
                            milesInput.value = Math.round(routeData.routes[0].distance * 0.000621371) + " mi";
                        }
                    }
                } catch (e) { console.error(e); } finally { indicator.classList.add('hidden'); }
            },

            async submit(e) {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                btn.innerText = "UPLOADING...";
                try {
                    const res = await fetch(`https://api.github.com/repos/${this.config.repo}/contents/trips.json`, {
                        headers: { 'Authorization': `token ${this.config.token}` }
                    });
                    const fileData = await res.json();
                    const trips = JSON.parse(atob(fileData.content));
                    const newEntry = {
                        order: document.getElementById('order_number').value.toUpperCase(),
                        pDate: document.getElementById('pickup_date').value,
                        pCity: document.getElementById('pickup_city').value,
                        dDate: document.getElementById('delivery_date').value,
                        dCity: document.getElementById('delivery_city').value,
                        truck: document.getElementById('truck').value.toUpperCase(),
                        trailer: document.getElementById('trailer').value.toUpperCase(),
                        estMiles: document.getElementById('est_miles').value,
                        tarp: document.querySelector('input[name="tarp_type"]:checked').value,
                        codriver: document.getElementById('co_driver').value || "SOLO"
                    };
                    trips.push(newEntry);
                    const update = await fetch(`https://api.github.com/repos/${this.config.repo}/contents/trips.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${this.config.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Log: ${newEntry.order}`, content: btoa(JSON.stringify(trips, null, 2)), sha: fileData.sha })
                    });
                    if(!update.ok) throw new Error();
                    alert("ENTRY LOGGED");
                    document.getElementById('log-form').reset();
                } catch (e) { alert("ERROR SAVING"); } finally { btn.disabled = false; btn.innerText = "Submit Log to Cloud"; }
            },

            applyTheme() {
                const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.classList.toggle('dark', isDark);
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            },

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            }
        };
        document.getElementById('log-form').addEventListener('submit', (e) => APP.submit(e));
        APP.init();
    </script>
</body>
</html>
